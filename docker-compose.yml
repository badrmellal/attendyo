# ===========================================================================
# LIWAN — Face Attendance & Access Control
# Full on-prem stack: Liwan Vision Engine + Liwan app. Runs on a single CPU box.
#   docker compose up -d
# Ports:
#   8000  Vision engine console (enrolment fallback / engine config)
#   8088  Liwan API (FastAPI)
#   3000  Liwan Console (admin dashboard)
#   3001  Liwan Gate (door kiosk)
# ===========================================================================

volumes:
  liwan-postgres-data:
  liwan-media:

networks:
  liwan:

services:
  # ---- Liwan Vision Engine (recognition core) -------------------------------
  # Image values point at the upstream registry that ships the engine runtime
  # images (implementation detail; see NOTICE for third-party attribution).
  liwan-postgres-db:
    image: ${registry}compreface-postgres-db:${POSTGRES_VERSION}
    container_name: liwan-postgres-db
    restart: always
    environment:
      - POSTGRES_USER=${postgres_username}
      - POSTGRES_PASSWORD=${postgres_password}
      - POSTGRES_DB=${postgres_db}
    volumes:
      - liwan-postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/10-liwan-schema.sql:ro
    # Deliberately NOT published to the host: 5432 is a common local-Postgres
    # port and the recommended seeding path (`docker compose exec liwan-api
    # python scripts/seed_demo.py`) never needs it. Add your own `ports:`
    # mapping to a free host port if you want a host-side DB client.
    networks: [liwan]

  liwan-engine-admin:
    # Liwan Vision Engine runtime image (management service).
    image: ${registry}compreface-admin:${ADMIN_VERSION}
    container_name: liwan-engine-admin
    restart: always
    depends_on: [liwan-postgres-db, liwan-engine-api]
    environment:
      - POSTGRES_USER=${postgres_username}
      - POSTGRES_PASSWORD=${postgres_password}
      - POSTGRES_URL=jdbc:postgresql://${postgres_domain}:${postgres_port}/${postgres_db}
      - SPRING_PROFILES_ACTIVE=dev
      - ENABLE_EMAIL_SERVER=${enable_email_server}
      - ADMIN_JAVA_OPTS=${engine_admin_java_options}
      - MAX_FILE_SIZE=${max_file_size}
      - MAX_REQUEST_SIZE=${max_request_size}B
    networks:
      liwan:
        # The vision-engine UI image (liwan-engine-ui) ships an nginx config
        # with the upstream hostname `compreface-admin` baked in from the
        # upstream project. This alias satisfies that lookup without
        # un-white-labeling the container's own name.
        aliases: [compreface-admin]

  liwan-engine-api:
    # Liwan Vision Engine runtime image (recognition REST API).
    image: ${registry}compreface-api:${API_VERSION}
    container_name: liwan-engine-api
    restart: always
    depends_on: [liwan-postgres-db]
    environment:
      - POSTGRES_USER=${postgres_username}
      - POSTGRES_PASSWORD=${postgres_password}
      - POSTGRES_URL=jdbc:postgresql://${postgres_domain}:${postgres_port}/${postgres_db}
      - SPRING_PROFILES_ACTIVE=dev
      - API_JAVA_OPTS=${engine_api_java_options}
      - SAVE_IMAGES_TO_DB=${save_images_to_db}
      - MAX_FILE_SIZE=${max_file_size}
      - MAX_REQUEST_SIZE=${max_request_size}B
      - CONNECTION_TIMEOUT=${connection_timeout:-10000}
      - READ_TIMEOUT=${read_timeout:-60000}
    networks:
      liwan:
        # Same reasoning as liwan-engine-admin above.
        aliases: [compreface-api]

  liwan-engine-core:
    # Liwan Vision Engine runtime image (ML inference, CPU-only).
    image: ${registry}compreface-core:${CORE_VERSION}
    container_name: liwan-engine-core
    restart: always
    environment:
      - ML_PORT=3000
      - IMG_LENGTH_LIMIT=${max_detect_size}
      - UWSGI_PROCESSES=${uwsgi_processes:-2}
      - UWSGI_THREADS=${uwsgi_threads:-2}
      - PYTHONUNBUFFERED=1
    networks:
      liwan:
        # Same reasoning as liwan-engine-admin above.
        aliases: [compreface-core]

  liwan-engine-ui:
    # Liwan Vision Engine runtime image (engine console at :8000).
    image: ${registry}compreface-fe:${FE_VERSION}
    container_name: liwan-engine-ui
    restart: always
    depends_on: [liwan-engine-api, liwan-engine-admin]
    ports:
      - "8000:80"
    environment:
      - CLIENT_MAX_BODY_SIZE=${max_request_size}
      - PROXY_READ_TIMEOUT=${read_timeout:-60000}ms
      - PROXY_CONNECT_TIMEOUT=${connection_timeout:-10000}ms
    networks: [liwan]

  # ---- Liwan application layer --------------------------------------------
  liwan-api:
    build:
      # Repo root context so the image bundles db/ (schema + migrations) for
      # self-healing startup migrations.
      context: .
      dockerfile: services/api/Dockerfile
    container_name: liwan-api
    restart: unless-stopped
    depends_on: [liwan-postgres-db, liwan-engine-api]
    environment:
      - DB_HOST=${postgres_domain}
      - DB_PORT=${postgres_port}
      - DB_NAME=${postgres_db}
      - DB_USER=${postgres_username}
      - DB_PASSWORD=${postgres_password}
      # Vision-engine connection (the API itself also accepts legacy variable
      # names from an older .env, so upgrades need no compose edits).
      - ENGINE_URL=${ENGINE_URL:-http://liwan-engine-api:8080}
      - ENGINE_API_KEY=${ENGINE_API_KEY:-}
      - LIWAN_JWT_SECRET=${LIWAN_JWT_SECRET}
      - LIWAN_ADMIN_EMAIL=${LIWAN_ADMIN_EMAIL}
      - LIWAN_ADMIN_PASSWORD=${LIWAN_ADMIN_PASSWORD}
      - LIWAN_DEVICE_KEY=${LIWAN_DEVICE_KEY}
    volumes:
      - liwan-media:/data/media
    ports:
      - "8088:8088"
    networks: [liwan]

  liwan-console:
    build:
      context: ./apps/console
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: liwan-console
    restart: unless-stopped
    depends_on: [liwan-api]
    ports:
      - "3000:3000"
    networks: [liwan]

  liwan-gate:
    build:
      context: ./apps/gate
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: liwan-gate
    restart: unless-stopped
    depends_on: [liwan-api]
    ports:
      - "3001:3000"
    networks: [liwan]

  # ---- Bridge: camera → recognition → door (optional; for fixed RTSP cams) -
  # Enable with: docker compose --profile cameras up -d
  liwan-bridge:
    build: ./services/bridge
    container_name: liwan-bridge
    restart: unless-stopped
    profiles: ["cameras"]
    depends_on: [liwan-api]
    environment:
      - LIWAN_API_URL=http://liwan-api:8088
      - LIWAN_DEVICE_KEY=${LIWAN_DEVICE_KEY}
    networks: [liwan]
