# ===========================================================================
# ATTENDYO — Face Attendance & Access Control
# Full on-prem stack: Attendyo Vision Engine + Attendyo app. Runs on a single CPU box.
#   docker compose up -d
# Ports:
#   8000  Vision engine console (enrolment fallback / engine config)
#   8088  Attendyo API (FastAPI)
#   3000  Attendyo Console (admin dashboard)
#   3001  Attendyo Gate (door kiosk)
# ===========================================================================

volumes:
  attendyo-postgres-data:
  attendyo-media:

networks:
  attendyo:

services:
  # ---- Attendyo Vision Engine (recognition core) -------------------------------
  # Image values point at the upstream registry that ships the engine runtime
  # images (implementation detail; see NOTICE for third-party attribution).
  attendyo-postgres-db:
    image: ${registry}compreface-postgres-db:${POSTGRES_VERSION}
    container_name: attendyo-postgres-db
    restart: always
    environment:
      - POSTGRES_USER=${postgres_username}
      - POSTGRES_PASSWORD=${postgres_password}
      - POSTGRES_DB=${postgres_db}
    volumes:
      - attendyo-postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/10-attendyo-schema.sql:ro
    # Deliberately NOT published to the host: 5432 is a common local-Postgres
    # port and the recommended seeding path (`docker compose exec attendyo-api
    # python scripts/seed_demo.py`) never needs it. Add your own `ports:`
    # mapping to a free host port if you want a host-side DB client.
    networks: [attendyo]

  attendyo-engine-admin:
    # Attendyo Vision Engine runtime image (management service).
    image: ${registry}compreface-admin:${ADMIN_VERSION}
    container_name: attendyo-engine-admin
    restart: always
    depends_on: [attendyo-postgres-db, attendyo-engine-api]
    environment:
      - POSTGRES_USER=${postgres_username}
      - POSTGRES_PASSWORD=${postgres_password}
      - POSTGRES_URL=jdbc:postgresql://${postgres_domain}:${postgres_port}/${postgres_db}
      - SPRING_PROFILES_ACTIVE=dev
      - ENABLE_EMAIL_SERVER=${enable_email_server}
      - ADMIN_JAVA_OPTS=${engine_admin_java_options}
      - MAX_FILE_SIZE=${max_file_size}
      - MAX_REQUEST_SIZE=${max_request_size}B
    networks:
      attendyo:
        # The vision-engine UI image (attendyo-engine-ui) ships an nginx config
        # with the upstream hostname `compreface-admin` baked in from the
        # upstream project. This alias satisfies that lookup without
        # un-white-labeling the container's own name.
        aliases: [compreface-admin]

  attendyo-engine-api:
    # Attendyo Vision Engine runtime image (recognition REST API).
    image: ${registry}compreface-api:${API_VERSION}
    container_name: attendyo-engine-api
    restart: always
    depends_on: [attendyo-postgres-db]
    environment:
      - POSTGRES_USER=${postgres_username}
      - POSTGRES_PASSWORD=${postgres_password}
      - POSTGRES_URL=jdbc:postgresql://${postgres_domain}:${postgres_port}/${postgres_db}
      - SPRING_PROFILES_ACTIVE=dev
      - API_JAVA_OPTS=${engine_api_java_options}
      - SAVE_IMAGES_TO_DB=${save_images_to_db}
      - MAX_FILE_SIZE=${max_file_size}
      - MAX_REQUEST_SIZE=${max_request_size}B
      - CONNECTION_TIMEOUT=${connection_timeout:-10000}
      - READ_TIMEOUT=${read_timeout:-60000}
    networks:
      attendyo:
        # Same reasoning as attendyo-engine-admin above.
        aliases: [compreface-api]

  attendyo-engine-core:
    # Attendyo Vision Engine runtime image (ML inference, CPU-only).
    image: ${registry}compreface-core:${CORE_VERSION}
    container_name: attendyo-engine-core
    restart: always
    environment:
      - ML_PORT=3000
      - IMG_LENGTH_LIMIT=${max_detect_size}
      - UWSGI_PROCESSES=${uwsgi_processes:-2}
      - UWSGI_THREADS=${uwsgi_threads:-2}
      - PYTHONUNBUFFERED=1
    networks:
      attendyo:
        # Same reasoning as attendyo-engine-admin above.
        aliases: [compreface-core]

  attendyo-engine-ui:
    # Attendyo Vision Engine runtime image (engine console at :8000).
    image: ${registry}compreface-fe:${FE_VERSION}
    container_name: attendyo-engine-ui
    restart: always
    depends_on: [attendyo-engine-api, attendyo-engine-admin]
    ports:
      - "8000:80"
    environment:
      - CLIENT_MAX_BODY_SIZE=${max_request_size}
      - PROXY_READ_TIMEOUT=${read_timeout:-60000}ms
      - PROXY_CONNECT_TIMEOUT=${connection_timeout:-10000}ms
    networks: [attendyo]

  # ---- Attendyo application layer --------------------------------------------
  attendyo-api:
    build:
      # Repo root context so the image bundles db/ (schema + migrations) for
      # self-healing startup migrations.
      context: .
      dockerfile: services/api/Dockerfile
    container_name: attendyo-api
    restart: unless-stopped
    depends_on: [attendyo-postgres-db, attendyo-engine-api]
    environment:
      - DB_HOST=${postgres_domain}
      - DB_PORT=${postgres_port}
      - DB_NAME=${postgres_db}
      - DB_USER=${postgres_username}
      - DB_PASSWORD=${postgres_password}
      # Vision-engine connection (the API itself also accepts legacy variable
      # names from an older .env, so upgrades need no compose edits).
      - ENGINE_URL=${ENGINE_URL:-http://attendyo-engine-api:8080}
      - ENGINE_API_KEY=${ENGINE_API_KEY:-}
      - ATTENDYO_JWT_SECRET=${ATTENDYO_JWT_SECRET}
      - ATTENDYO_ADMIN_EMAIL=${ATTENDYO_ADMIN_EMAIL}
      - ATTENDYO_ADMIN_PASSWORD=${ATTENDYO_ADMIN_PASSWORD}
      - ATTENDYO_DEVICE_KEY=${ATTENDYO_DEVICE_KEY}
    volumes:
      - attendyo-media:/data/media
    ports:
      - "8088:8088"
    networks: [attendyo]

  attendyo-console:
    build:
      context: ./apps/console
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: attendyo-console
    restart: unless-stopped
    depends_on: [attendyo-api]
    ports:
      - "3000:3000"
    networks: [attendyo]

  attendyo-gate:
    build:
      context: ./apps/gate
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        # The kiosk authenticates its /api/recognize calls with the shared device
        # key. NEXT_PUBLIC_* are inlined at BUILD time, so this must be a build
        # arg (not just a runtime env) — without it the API returns 401 and the
        # kiosk shows nothing. It ends up in the client bundle: acceptable for an
        # on-prem terminal on a trusted LAN, which is exactly what holds this key.
        - NEXT_PUBLIC_DEVICE_KEY=${ATTENDYO_DEVICE_KEY}
        # Optional: pin this terminal to a specific camera/door so the door fires
        # and attendance is attributed. Otherwise pass ?camera=<id>&door=<id> in
        # the kiosk URL. Both default to empty.
        - NEXT_PUBLIC_CAMERA_ID=${GATE_CAMERA_ID:-}
        - NEXT_PUBLIC_DOOR_ID=${GATE_DOOR_ID:-}
    container_name: attendyo-gate
    restart: unless-stopped
    depends_on: [attendyo-api]
    ports:
      - "3001:3000"
    networks: [attendyo]

  # ---- Bridge: camera → recognition → door (optional; for fixed RTSP cams) -
  # Enable with: docker compose --profile cameras up -d
  attendyo-bridge:
    build: ./services/bridge
    container_name: attendyo-bridge
    restart: unless-stopped
    profiles: ["cameras"]
    depends_on: [attendyo-api]
    environment:
      - ATTENDYO_API_URL=http://attendyo-api:8088
      - ATTENDYO_DEVICE_KEY=${ATTENDYO_DEVICE_KEY}
    networks: [attendyo]
